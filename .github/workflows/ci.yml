name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@10 --activate

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Type check web
        run: pnpm --filter @linkify/web typecheck

      - name: Run API tests
        run: pnpm test

      - name: Build API
        run: pnpm build

      - name: Build web
        run: pnpm --filter @linkify/web build
